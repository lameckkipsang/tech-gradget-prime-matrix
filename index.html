<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Selection Challenge</title>
</head>
<body>

    <main class="container">
        <h1>TechGadget Comparison</h1>
        
        <div class="grid">
            <article>
                <h2>Standard Model</h2>
                <div>Perfect for daily use.</div>
                <div class="price-tag">
                    <span>$</span> 99
                    <div>Includes free shipping</div> </div>
                <button>Buy Now</button>
            </article>

            <article>
                <h2>Pro Model</h2>
                <div>For the power users.</div>
                <div class="price-tag">
                    <span>$</span> 199
                </div>
                <button>Buy Now</button>
            </article>
        </div>

        <ul class="features">
            <li>OLED Display</li>
            <li>12-hour Battery</li>
            <li>Water Resistant</li>
            <li>5G Enabled</li>
        </ul>
    </main>

</body>
</html>
