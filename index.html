<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Selection Challenge</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="container">
        <header class="hero">
            <h1>TechGadget Comparison</h1>
        </header>
        
        <div class="grid">
            <article>
                <h2>Standard Model</h2>
                <p>Perfect for daily use.</p>
                <div class="price-tag">
                    <span>$</span> 99
                    <div>Includes free shipping</div> </div>
                <button>Buy Now</button>
            </article>
            <article>
                <h2>Pro Model</h2>
                <p>For the power users.</p>
                <div class="price-tag">
                    <span>$</span> 199
                </div>
                <button>Buy Now</button>
            </article>
        </div>

        <ul class="features">
            <li>OLED Display</li>
            <li>12-hour Battery</li>
            <li>Water Resistant</li>
            <li>5G Enabled</li>
        </ul>
    </main>
    <footer>
                <a href="#">Link</a>
            </footer>


</body>
</html>
